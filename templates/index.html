<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SismosVE - Monitoreo S&#237;smico Venezuela</title>
    <meta name="description" content="Monitoreo s&#237;smico en tiempo real de Venezuela con datos oficiales de FUNVISIS.">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="/static/styles.css?v=3">
</head>
<body>

<div class="app-layout">

    <header class="topbar">
        <div class="topbar-left">
            <div class="logo">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/><path d="M12 6C9 6 6 9 6 12s3 6 6 6 6-3 6-6-3-6-6-6"/></svg>
            </div>
            <div>
                <div class="app-name">SismosVenezuela.com</div>
                <div class="app-tagline">Monitoreo Sismico en tiempo real</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="badge-live">
                <div class="pulse-dot"></div>
                Fuente: Funvisis + USGS + EMSC
            </div>
            <div class="last-update" id="lastUpdateText">Actualizando...</div>
            <button class="btn-reload" id="loadData" title="Recargar datos">&#8635; Recargar</button>
        </div>
    </header>

    <main class="main-content">

        <div class="map-wrap">
            <div id="map" role="img" aria-label="Mapa interactivo de sismos en Venezuela"></div>

            <div class="filter-panel">
                <div class="filter-section-label">Magnitud m&#237;nima</div>
                <div class="filter-row">
                    <input type="range" min="0" max="6" value="0" step="0.5" id="magFilter">
                    <span class="filter-val" id="magFilterVal">0.0</span>
                </div>
                <div class="filter-section-label">Per&#237;odo</div>
                <div class="time-pills">
                    <button class="pill" data-period="all">Todo</button>
                    <button class="pill active" data-period="24h">24h</button>
                    <button class="pill" data-period="7d">7d</button>
                </div>
            </div>

            <div class="map-legend">
                <div class="legend-title">Magnitud</div>
                <div class="legend-items">
                    <div class="legend-item">
                        <div class="legend-dot" style="width:8px;height:8px;background:#4ecf9e;"></div>
                        &lt; 2.5
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="width:10px;height:10px;background:#EF9F27;"></div>
                        2.5 &ndash; 3.5
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="width:13px;height:13px;background:#D85A30;"></div>
                        &gt; 3.5
                    </div>
                </div>
            </div>

            <div class="status-bar" id="statusBar">Cargando...</div>
        </div>

        <aside class="sidebar">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total sismos</div>
                    <div class="stat-val" id="totalCount">&ndash;</div>
                    <div class="stat-sub" id="totalPeriodLabel">&#250;ltimas 24h</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Mayor magnitud</div>
                    <div class="stat-val red" id="maxMagnitude">&ndash;</div>
                    <div class="stat-sub" id="maxMagLocation">&ndash;</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Promedio</div>
                    <div class="stat-val amber" id="avgMagnitude">&ndash;</div>
                    <div class="stat-sub">magnitud</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">&#218;ltimo sismo</div>
                    <div class="stat-val green" id="lastEarthquake" style="font-size:13px;line-height:1.3;">&ndash;</div>
                    <div class="stat-sub" id="lastEarthquakeTime">&ndash;</div>
                </div>
            </div>

            <div class="list-header">
                <div class="list-title">Sismos recientes</div>
                <button class="sort-toggle" id="sortToggle">&#8597; Magnitud</button>
            </div>

            <div class="earthquake-list" id="earthquakeList" role="list" aria-live="polite"></div>
        </aside>

    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>window.API_ENDPOINT = '/api/registro';</script>
<script type="module" src="/static/js/main.js?v=4"></script>

</body>
</html>
